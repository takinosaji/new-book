image: ghcr.io/quarto-dev/quarto:latest

stages:
  - lint
  - deploy
  - invoke-ai-pipeline

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  DOCKER_DRIVER: overlay2

lint:
  stage: lint
  image: node:lts-alpine
  script:
    - npm install -g markdownlint-cli2
    - markdownlint-cli2 "**/*.md" "!.venv/**" "!node_modules/**" "!_site/**" "!_book/**" --config .markdownlint-md.yml
    - markdownlint-cli2 "**/*.qmd" --config .markdownlint-qmd.yml

pages:
  stage: deploy
  script:
    - apt-get update -qq && apt-get install -y -qq python3 python3-pip
    - python3 -m pip install --quiet python-docx lxml
    - cp src/_quarto.yml src/_quarto-book.yml
    - cp src/_quarto-website.yml src/_quarto.yml
    - cd src/ && quarto render && cd ..
    - cp src/_quarto-book.yml src/_quarto.yml
    - python3 sdlc/ci/build-scripts/render_book.py
    - mv _site public
    - cp _book/*.docx public/
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

docx:
  stage: deploy
  script:
    - apt-get update -qq && apt-get install -y -qq python3 python3-pip
    - python3 -m pip install --quiet python-docx lxml
    - python3 sdlc/ci/build-scripts/render_book.py
  artifacts:
    paths:
      - _book/*.docx
    expire_in: 365 days
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: on_success

Invoke AI/Run CodeMie Pipeline:
  stage: invoke-ai-pipeline
  image: alpine:3
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
  before_script:
    - apk add --no-cache curl jq
  script:
    - |
      PAYLOAD=$(jq -n '$ENV | {
        object_kind: "merge_request",
        event_type: "merge_request",
        user: {
          id: (.GITLAB_USER_ID | tonumber),
          name: .GITLAB_USER_NAME,
          username: .GITLAB_USER_LOGIN,
          avatar_url: null,
          email: .GITLAB_USER_EMAIL
        },
        project: {
          id: (.CI_PROJECT_ID | tonumber),
          name: .CI_PROJECT_NAME,
          description: .CI_PROJECT_DESCRIPTION,
          web_url: .CI_PROJECT_URL,
          avatar_url: null,
          namespace: .CI_PROJECT_NAMESPACE,
          visibility_level: .CI_PROJECT_VISIBILITY,
          path_with_namespace: .CI_PROJECT_PATH,
          default_branch: .CI_DEFAULT_BRANCH,
          homepage: .CI_PROJECT_URL,
          http_url: "\(.CI_PROJECT_URL).git"
        },
        object_attributes: {
          iid: (.CI_MERGE_REQUEST_IID | tonumber),
          title: .CI_MERGE_REQUEST_TITLE,
          description: .CI_MERGE_REQUEST_DESCRIPTION,
          draft: (.CI_MERGE_REQUEST_TITLE | test("^Draft:|^WIP:"; "i")),
          source_branch: .CI_MERGE_REQUEST_SOURCE_BRANCH_NAME,
          target_branch: .CI_MERGE_REQUEST_TARGET_BRANCH_NAME,
          source_project_id: (.CI_MERGE_REQUEST_SOURCE_PROJECT_ID | tonumber),
          target_project_id: (.CI_PROJECT_ID | tonumber),
          head_pipeline_id: (.CI_PIPELINE_ID | tonumber),
          state: "opened",  # always true: merge_request_event pipelines only run on open MRs
          action: "update", # not available as a CI variable; pipelines fire on push, which corresponds to update
          url: "\(.CI_PROJECT_URL)/-/merge_requests/\(.CI_MERGE_REQUEST_IID)",
          diff_base_sha: .CI_MERGE_REQUEST_DIFF_BASE_SHA,
          source_branch_sha: .CI_MERGE_REQUEST_SOURCE_BRANCH_SHA,
          target_branch_sha: .CI_MERGE_REQUEST_TARGET_BRANCH_SHA,
          labels: ((.CI_MERGE_REQUEST_LABELS // "") | split(",") | map(select(length > 0)) | map({title: .})),
          last_commit: {
            id: .CI_COMMIT_SHA,
            message: .CI_COMMIT_MESSAGE,
            title: .CI_COMMIT_TITLE,
            timestamp: .CI_COMMIT_TIMESTAMP,
            url: "\(.CI_PROJECT_URL)/-/commit/\(.CI_COMMIT_SHA)",
            author: {
              name: ((.CI_COMMIT_AUTHOR // "") | gsub(" <[^>]+>$"; "")),
              email: ((.CI_COMMIT_AUTHOR // "") | capture(".*<(?<e>[^>]+)>$") | .e)
            }
          }
        },
        labels: ((.CI_MERGE_REQUEST_LABELS // "") | split(",") | map(select(length > 0)) | map({title: .})),
        repository: {
          name: .CI_PROJECT_NAME,
          description: .CI_PROJECT_DESCRIPTION,
          homepage: .CI_PROJECT_URL,
          http_url: "\(.CI_PROJECT_URL).git"
        }
      }')

      curl -fsSL -o /dev/null -X POST "$EXTERNAL_CHECKS_URL" \
        -H "Content-Type: application/json" \
        -H "X-Gitlab-Token: $EXTERNAL_CHECKS_API_KEY" \
        -d "$PAYLOAD"

      echo "Webhook triggered. Polling for external check result..."
      MAX_WAIT=300
      POLL_INTERVAL=10
      ELAPSED=0

      while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
        COUNT=$(curl -fsSL \
          --header "PRIVATE-TOKEN: $CI_JOB_TOKEN" \
          "$CI_API_V4_URL/projects/$CI_PROJECT_ID/repository/commits/$CI_COMMIT_SHA/statuses" \
          | jq 'length')

        echo "[$ELAPSED/${MAX_WAIT}s] Statuses found: $COUNT"

        if [ "$COUNT" -gt 0 ]; then
          echo "External job registered. Continuing."
          exit 0
        fi

        sleep "$POLL_INTERVAL"
        ELAPSED=$((ELAPSED + POLL_INTERVAL))
      done

      echo "Timed out after ${MAX_WAIT}s waiting for external check."
      exit 1

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_TAG
    - if: $CI_COMMIT_BRANCH == 'development' || $CI_COMMIT_BRANCH == 'main'
    - if: $CI_PIPELINE_SOURCE == "web"
      when: always
